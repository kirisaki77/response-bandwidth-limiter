name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Core tests (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python-version:
          - '3.10'
          - '3.14'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements/dev.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install pinned test dependencies
        run: python -m pip install -r requirements/dev.txt -e ".[dev]"

      - name: Run test suite
        run: python -m pytest -q

  redis-integration:
    name: Redis integration (Python 3.14)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      REDIS_URL: redis://127.0.0.1:6379/0
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements/dev.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install pinned test dependencies
        run: python -m pip install -r requirements/dev.txt -e ".[dev]"

      - name: Run shared-counter integration test
        run: python -m pytest -q tests/test_redis_backend.py::test_redis_backend_shares_counters_across_evaluators

  build:
    name: Build verification (Python 3.14)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements/dev.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install pinned build tooling
        run: python -m pip install -r requirements/dev.txt

      - name: Build distribution
        run: python -m build

      - name: Validate distribution metadata
        run: python -m twine check dist/*
